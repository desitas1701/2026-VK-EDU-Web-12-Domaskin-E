services:
  web:
    build: .
    command: sh -c "python manage.py runserver 0.0.0.0:${PORT:-8000}"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media

  scss:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules

volumes:
  media_data:
  node_modules_data:
